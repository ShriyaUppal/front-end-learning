<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: powderblue;">
    <!--
    HTML styles are used to style html elements such as color, font , size and more.
    Setting the style of an HTML element, can be done with the style attribute.

    Background Color: The CSS background color property defines the background color for an HTML element.
    -->
    <h1 style="background-color: aquamarine;">This is a heading.</h1>
    <p style="background-color: tomato;">This is a paragraph.</p>

    <!--
    Text Color Property:
    The CSS color property defines the text color for an HTML element. 
    Fonts:
    The CSS font-family property defines the font to be used for an HTML element.
    Text Size:
    The CSS font-size property defines the text size for an HTML element.
    -->

    <h2 style="color: red;">This is another heading.</h2>
    <p style="font-family: 'Courier New', Courier, monospace;">This is an another paragraph.</p>
    <p style="font-size: 300%;">The font-size of this text is increased</p>

    <!--
    Text-alignment:
    The CSS text-align property defines the horizontal alignment for an HTML document:
    -->
    <h2 style="text-align: center;">Centered Heading.</h2>

</body>
</html>
