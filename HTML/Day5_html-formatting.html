<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--
    HTML Text Formatting
    HTML containing several elements for defining text with special meaning.
    HTML Formatting Elements:
    <b> bold text.
    <strong> important text.
    <i> italic text
    <em> emphasized text.
    <mark> marked text.
    <small> smaller text.
    <del> deleted text.
    <ins> inserted text.
    <sub> subscript text.
    <sup> superscript text.              
    -->

    <!--
    HTML <b> and strong element.
    The html <b> element defines bold text, without any extra importance. 
    -->
    <b>This text is bold.</b><br>

    <!--
    HTML <strong> element.
    The html <strong> element defines the text with strong importance. The content inside is typically displayed in bold.    
    -->
    <strong>This text is important.</strong><br>
    
    <!--
    HTML <i> and <em> element.
    The html <i> element defines italic text. The text inside the <i> tag will be displayed in italic.
    The html <em> element defines emphasized text. The text inside <em> is typically displayed in italic.
    -->
    <i>This text italic.</i><br>
    <em>This text is emphasized.</em><br>

    <!--
    HTML <small> element.
    The html <small> element defines smaller text.
    -->
    <small>This is some smaller text.</small>  <br>
    
    <!--
    HTML <mark> element
    The html <mark> element defines text that should be marked or highlighted.
    -->
        <p>Do not forget to buy <mark>milk</mark> today.</p>
    
    <!--
    HTML <del> element.
    HTML <del> element defines text that has been deleted from document. Browser usually strikes a line through deleted text.
    -->
    <p>My favourite color is <del>blue</del> white.</p>

    <!--
    The html <ins> element.
    The html <ins> element defines the text that has been inserted into the document. Browsers will usually underline inserted text.     
    -->
    <p>My favourite color is <del>blue</del> <ins>white</ins></p>  
    
    <!--
    HTML <sub> element.
    The html <sub> element defines subscript text. Subscript text appears half a character below the normal line and is sometimes rendered in a smaller font.
    -->
    <p>The chemical formula of water is H <sub>2</sub> O.</p>   
    
    <!--
    HTML <sup> element.
    The html <sup> element defines superscript text. Superscript text appears half a character above the normal line, and is sometimes rendered in a smaller text. 
    -->
    <p>This is <sup>Superscript</sup> text.</p>
</body>
</html>
