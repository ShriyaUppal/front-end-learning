<!--
HTML Headings
HTML headings are defined with the help of <h1> <h2> <h3> <h4> <h5> <h6>.
<h1> defines the most important heading and <h6> defines the least important heading. 
-->

<doctype html>
    <html>
        <body>
            <h1>This is Heading 1</h1>
            <h2>This is Heading 2</h2>
            <h3>This is Heading 3</h3>
            <h4>This is Heading 4</h4>
            <h5>This is Heading 5</h5>
            <h6>This is Heading 6</h6>

            <!-- HTML paragraphs are defined with <p> tag -->
                <p>This is a paragraph tag.</p>
            <!--
                 HTML links are defined with <a> tag.
                 The link destination is specified in the attribute tag.
                 Attributes are used to provide additionl information about HTML elements. 
                -->
                <a href="https://www.w3schools.com">This is a link.</a>  

            <!--
                HTML images are defined with the <img> tag.
                The source file (src), alternate text (alt) width and height are provided as attributes.
            -->
                <img src="test-img.jpg" alt="image-text" width="120" height="120">
                
            
        </body>
    </html>
