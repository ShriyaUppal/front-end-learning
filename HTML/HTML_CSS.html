<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML CSS</title>
    <style>
        body{
            background-color: aquamarine;
        }
        h2, h3{
            background-color: aqua;
            color: black;
        }
    </style>
</head>
<body>
    <!--
    There are 3 ways to apply CSS to an HTML document.
    Inline CSS: By using style attribute inside HTML element.
    Internal CSS: By using <style> element in the <head> section.
    External CSS: By using <link> element to link to an external CSS file.
    -->

    <!--
    Inline CSS:
    An inline style is used to apply a unique style to a single HTML element.
    An inline CSS uses the style attribute of an HTML element.
    -->
    <h1 style="color: blue;">A Blue Heading</h1>
    <p style="color: red;">A Red Paragraph.</p>

    <!--
    Internal CSS:
    An internal CSS is used when you want to style single html page.
    Internal CSS is applied as a style element in the head section of an HTML document.
    -->
    <h2>This is heading1 which is styled using internal CSS. </h2>
    <h3>This is heading2 which is also styled using external CSS.</h3>
</body>
</html>
