<!DOCTYPE html>
<htnl>
    <head>
        <title>Attributes</title>
    </head>
    <body>
        <!--
        HTML attributes provides additional information about html elements.
        Attributes always defined in the start tag of the HTML tag.
        Attributes usually comes in name value pairs.
        -->

        <!--
        The href attribute
        The <a> tag defines a hyperlink. The href attribute specifies the URL of the page where the link goes.
        -->
        <a href="https://www.w3schools.com">Visit W3schhols</a>

        <!--
        The src attribute 
        The <img> tag is used to embed an image in an HTML page. The src attribute is used to specify the path to the image to be displayed. 
        There are two ways to specify the URL in the src attribute.
        Absolute URL: Link to an external image that is hosted on the another website.
        Relative URL: Link to an image that is hosted within the website.
        The img tag also contains width and height attributes which is used to specify the width and height of an image. 
        The required alt attribute specifices the alt text of an image.
        -->
        <img src="test-img.jpg" alt="Image-text" width="200" height="200">

        <!---
        The style attribute is used to add styles to an elemen, such as color, font-size and more. 
        -->
        <p style="color: red;">Styled Paragraph.</p>
    </body>
</htnl>
