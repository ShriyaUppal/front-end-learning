<!DOCTYPE html>
<html lang="en">
    <body>
        <head>
            <title>Headings</title>
        </head>  
        <!--
        HTML headings are titles and subtitles that you want to display in your webpage.
        HTML haedings are defined with <h1> to <h6> tags.
        <h1> defines the most important heading and the <h6> defines the least important heading.
        Browser automatically adds margin before and after a heading.
        -->

        <!--
        Headings are important
        Search engines use the headings to index the structure and content of your web pages.
        Users often skim a page by its headings. It is important to use headigs to show the document structure.
        <h1> headings should be used for main headings, follwed by <h2> headings, then the less important <h3>.
        For example
        <h1> - Page Title
        <h2> - Section Title.
        <h3> - Sub-sections.
        -->
        <h1>Travel Guide</h1>
        
        <h2>Europe </h2>
        <h3>France</h3>
        <h3>Italy</h3>

        <h2>Asia</h2>
        <h3>India</h3>
        <h3>Thailand</h3>

        <!--
        Tip: Use only one <h1> per page - it represents the main topic or topic.
        -->
    </body>
</html>
